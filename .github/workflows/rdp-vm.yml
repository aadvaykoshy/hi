name: Windows RDP VM with Serveo

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (default 360)'
        required: false
        default: '360'

jobs:
  rdp-vm:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop' -ErrorAction SilentlyContinue

      - name: Set RDP Password
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString "P@ssw0rd123" -AsPlainText -Force
          Get-LocalUser -Name "runneradmin" | Set-LocalUser -Password $password

      - name: Install Chrome
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile C:\chrome_installer.exe
          & C:\chrome_installer.exe /silent /install /system-level

      - name: Download PuTTY (for SSH tunnel)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://the.earth.li/~sgtatham/putty/latest/w64/plink.exe" -OutFile C:\plink.exe

      - name: Start Serveo Tunnel
        shell: pwsh
        run: |
          $serveoCmd = 'echo y | C:\plink.exe -batch -ssh -R 3389:localhost:3389 serveo.net'
          Invoke-Expression $serveoCmd -ErrorAction SilentlyContinue &
          Start-Sleep -Seconds 5

      - name: Display Connection Info
        shell: pwsh
        run: |
          Write-Host "================================"
          Write-Host "RDP VM is ONLINE"
          Write-Host "================================"
          Write-Host "Username: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host ""
          Write-Host "Serveo Tunnel Active!"
          Write-Host "Connection will be available at:"
          Write-Host "PORT: 3389 via Serveo SSH reverse tunnel"
          Write-Host ""
          Write-Host "NO CREDIT CARD REQUIRED!"
          Write-Host "NO SIGNUP REQUIRED!"
          Write-Host "================================"

      - name: Keep VM Running
        shell: pwsh
        run: |
          $duration = ${{ inputs.duration || 360 }}
          Write-Host "VM running for $duration minutes..."
          Start-Sleep -Seconds ($duration * 60)
