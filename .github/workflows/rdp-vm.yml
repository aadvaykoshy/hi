name: Windows RDP VM with Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (default 360)'
        required: false
        default: '360'

jobs:
  rdp-vm:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download Cloudflare Tunnel
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/download/2024.2.1/cloudflared-windows-amd64.exe" -OutFile C:\cloudflared.exe

      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop' -ErrorAction SilentlyContinue

      - name: Set RDP Password
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString "P@ssw0rd123" -AsPlainText -Force
          Get-LocalUser -Name "runneradmin" | Set-LocalUser -Password $password

      - name: Install Chrome
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile C:\chrome_installer.exe
          & C:\chrome_installer.exe /silent /install /system-level

      - name: Start Cloudflare Tunnel
        shell: pwsh
        env:
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          Start-Process C:\cloudflared.exe -ArgumentList "tunnel", "run", "--token", "$env:CLOUDFLARE_TOKEN" -NoNewWindow

      - name: Display Connection Info
        shell: pwsh
        run: |
          Write-Host "================================"
          Write-Host "RDP VM is ONLINE"
          Write-Host "================================"
          Write-Host "Username: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host ""
          Write-Host "Cloudflare Tunnel Active!"
          Write-Host "Check your Cloudflare dashboard for tunnel details:"
          Write-Host "https://dash.cloudflare.com/"
          Write-Host ""
          Write-Host "Go to: Workers & Pages > Tunnels"
          Write-Host "Find your tunnel and click 'Configure'"
          Write-Host "Add route: 3389/tcp -> localhost:3389"
          Write-Host ""
          Write-Host "================================"

      - name: Keep VM Running
        shell: pwsh
        run: |
          $duration = ${{ inputs.duration || 360 }}
          Write-Host "VM running for $duration minutes..."
          Start-Sleep -Seconds ($duration * 60)
