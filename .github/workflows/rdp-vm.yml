name: Browser VNC (noVNC)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (default 360)'
        required: false
        default: '360'

jobs:
  vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read

    steps:
      - name: Install desktop environment and VNC tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xfce4 xfce4-goodies x11vnc xvfb novnc websockify

      - name: Start virtual display (Xvfb)
        run: |
          Xvfb :1 -screen 0 1280x800x24 &
          echo "DISPLAY=:1" >> $GITHUB_ENV
          sleep 2

      - name: Start XFCE4 desktop
        run: |
          DISPLAY=:1 startxfce4 &
          sleep 3

      - name: Set VNC password
        run: |
          mkdir -p ~/.vnc
          VNC_PASS=$(openssl rand -base64 12)
          echo "VNC_PASS=$VNC_PASS" >> $GITHUB_ENV
          x11vnc -storepasswd "$VNC_PASS" ~/.vnc/passwd

      - name: Start x11vnc server
        run: |
          x11vnc -display :1 -rfbport 5901 -rfbauth ~/.vnc/passwd -forever -shared -bg -o /tmp/x11vnc.log
          sleep 2

      - name: Start noVNC (websockify)
        run: |
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          sleep 2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install LocalTunnel
        run: npm install -g localtunnel

      - name: Start LocalTunnel and capture URL
        run: |
          lt --port 6080 > /tmp/tunnel_output.txt 2>&1 &
          # Wait up to 30 seconds for the tunnel URL
          URL=""
          for i in $(seq 1 15); do
            sleep 2
            URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.loca\.lt' /tmp/tunnel_output.txt | head -1)
            if [ -n "$URL" ]; then break; fi
          done
          if [ -n "$URL" ]; then
            echo "TUNNEL_URL=$URL" >> $GITHUB_ENV
          else
            echo "TUNNEL_URL=URL_NOT_FOUND" >> $GITHUB_ENV
            echo "Warning: could not capture tunnel URL. Raw output:"
            cat /tmp/tunnel_output.txt
          fi

      - name: Display connection info
        run: |
          TUNNEL_PASSWORD=$(curl -s https://loca.lt/mytunnelpassword || echo "Failed to fetch automatically – visit https://loca.lt/mytunnelpassword from the runner to retrieve it")
          echo "================================"
          echo "Browser VNC is ONLINE"
          echo "================================"
          if [ "$TUNNEL_URL" = "URL_NOT_FOUND" ]; then
            echo "WARNING: LocalTunnel URL could not be determined."
            echo "Check the 'Start LocalTunnel and capture URL' step output above."
          else
            echo "Open this URL in your browser:"
            echo "  $TUNNEL_URL/vnc.html"
            echo ""
            echo "VNC Password: $VNC_PASS"
            echo ""
            echo "LocalTunnel Bypass Password: $TUNNEL_PASSWORD"
            echo "(Enter this when the loca.lt page asks for a password)"
          fi
          echo "================================"

      - name: Keep VM running
        run: |
          duration=${{ inputs.duration || 360 }}
          echo "VM running for $duration minutes..."
          sleep $((duration * 60))
