name: Windows RDP VM with LocalTunnel

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (default 360)'
        required: false
        default: '360'

jobs:
  rdp-vm:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop' -ErrorAction SilentlyContinue

      - name: Set RDP Password
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString "P@ssw0rd123" -AsPlainText -Force
          Get-LocalUser -Name "runneradmin" | Set-LocalUser -Password $password

      - name: Install Chrome
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile C:\chrome_installer.exe
          & C:\chrome_installer.exe /silent /install /system-level

      - name: Install Node.js
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v18.19.0/node-v18.19.0-win-x64.msi" -OutFile C:\node-installer.msi
          & msiexec.exe /i C:\node-installer.msi /quiet /norestart

      - name: Install LocalTunnel
        shell: pwsh
        run: |
          npm install -g localtunnel

      - name: Start LocalTunnel
        shell: pwsh
        run: |
          Start-Process powershell -ArgumentList "-NoExit", "-Command", "lt --port 3389" -NoNewWindow

      - name: Wait for Tunnel
        shell: pwsh
        run: |
          Start-Sleep -Seconds 15

      - name: Display Connection Info
        shell: pwsh
        run: |
          Write-Host "================================"
          Write-Host "RDP VM is ONLINE"
          Write-Host "================================"
          Write-Host "Username: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host ""
          Write-Host "LocalTunnel Active!"
          Write-Host "Check the logs above for your tunnel URL"
          Write-Host "It will look like: https://xyz123.loca.lt"
          Write-Host ""
          Write-Host "To connect:"
          Write-Host "1. Use the tunnel URL in Remote Desktop"
          Write-Host "2. Or connect to localhost:3389 if on same network"
          Write-Host ""
          Write-Host "NO CREDIT CARD REQUIRED!"
          Write-Host "================================"

      - name: Keep VM Running
        shell: pwsh
        run: |
          $duration = ${{ inputs.duration || 360 }}
          Write-Host "VM running for $duration minutes..."
          Start-Sleep -Seconds ($duration * 60)
