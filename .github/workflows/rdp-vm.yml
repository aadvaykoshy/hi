name: Windows RDP VM with LocalTunnel

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (default 360)'
        required: false
        default: '360'

jobs:
  rdp-vm:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop' -ErrorAction SilentlyContinue

      - name: Set RDP Password
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString "P@ssw0rd123" -AsPlainText -Force
          Get-LocalUser -Name "runneradmin" | Set-LocalUser -Password $password

      - name: Install Chrome
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile C:\chrome_installer.exe
          & C:\chrome_installer.exe /silent /install /system-level

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install LocalTunnel
        shell: pwsh
        run: |
          npm install -g localtunnel

      - name: Start LocalTunnel and Capture URL
        shell: pwsh
        run: |
          # Start lt in a background job so we can read its output (which contains the tunnel URL)
          $job = Start-Job -ScriptBlock {
            $env:PATH = $env:PATH + ";C:\Users\runneradmin\AppData\Roaming\npm;C:\Program Files\nodejs"
            & lt --port 3389 2>&1
          }

          # Wait up to 30 seconds for the tunnel URL to appear in job output
          $url = $null
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            $output = Receive-Job -Job $job -Keep
            foreach ($line in $output) {
              if ($line -match 'https://[a-zA-Z0-9\-]+\.loca\.lt') {
                $url = $Matches[0]
                break
              }
            }
            if ($url) { break }
          }

          if ($url) {
            Write-Host "Tunnel URL captured: $url"
            $url | Out-File 'C:\tunnel_url.txt' -NoNewline -Encoding UTF8
          } else {
            Write-Host "Warning: Could not capture tunnel URL within $timeout seconds"
            Write-Host "Job output so far:"
            Receive-Job -Job $job -Keep | ForEach-Object { Write-Host $_ }
            # Write a placeholder so subsequent steps don't fail
            "URL_NOT_FOUND" | Out-File 'C:\tunnel_url.txt' -NoNewline -Encoding UTF8
          }

      - name: Display Connection Info
        shell: pwsh
        run: |
          $url = Get-Content 'C:\tunnel_url.txt' -Raw
          Write-Host "================================"
          Write-Host "RDP VM is ONLINE"
          Write-Host "================================"
          Write-Host "Username: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host ""
          if ($url -eq 'URL_NOT_FOUND') {
            Write-Host "WARNING: LocalTunnel URL could not be determined."
            Write-Host "Check the 'Start LocalTunnel and Capture URL' step output above for the tunnel URL."
          } else {
            $hostname = $url -replace 'https://', ''
            Write-Host "LocalTunnel Active!"
            Write-Host "Tunnel URL: $url"
            Write-Host ""
            Write-Host "To connect via Remote Desktop:"
            Write-Host "  Host:     $hostname"
            Write-Host "  Username: runneradmin"
            Write-Host "  Password: P@ssw0rd123"
            Write-Host ""
            Write-Host "NOTE: If prompted for a password by the loca.lt page, visit https://loca.lt/mytunnelpassword"
          }
          Write-Host "NO CREDIT CARD REQUIRED!"
          Write-Host "================================"

      - name: Keep VM Running
        shell: pwsh
        run: |
          $duration = ${{ inputs.duration || 360 }}
          Write-Host "VM running for $duration minutes..."
          Start-Sleep -Seconds ($duration * 60)
