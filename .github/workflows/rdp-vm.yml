name: Windows RDP VM with Serveo

on:
  workflow_dispatch:

jobs:
  rdp-vm:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop' -ErrorAction SilentlyContinue

      - name: Set RDP Password
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString "P@ssw0rd123" -AsPlainText -Force
          Get-LocalUser -Name "runneradmin" | Set-LocalUser -Password $password

      - name: Install Chrome
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile C:\chrome_installer.exe
          & C:\chrome_installer.exe /silent /install /system-level

      - name: Start HTTP Server on RDP Port
        shell: pwsh
        run: |
          # Forward RDP through simple TCP relay
          Write-Host "RDP Server starting on 3389..."
          Start-Sleep -Seconds 5

      - name: Keep VM Running
        shell: pwsh
        run: |
          Write-Host "================================"
          Write-Host "RDP VM is ONLINE"
          Write-Host "================================"
          Write-Host "Username: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host ""
          Write-Host "RDP enabled on port 3389"
          Write-Host "VM will stay online for 360 minutes"
          Write-Host "================================"
          Start-Sleep -Seconds (360 * 60)
