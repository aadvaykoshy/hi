name: Windows RDP VM with ngrok

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (default 360)'
        required: false
        default: '360'

jobs:
  rdp-vm:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download ngrok
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile C:\ngrok.zip
          Expand-Archive -Path C:\ngrok.zip -DestinationPath C:\ngrok -Force

      - name: Configure ngrok
        shell: pwsh
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          C:\ngrok\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN

      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop' -ErrorAction SilentlyContinue

      - name: Set RDP Password
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString "P@ssw0rd123" -AsPlainText -Force
          Get-LocalUser -Name "runneradmin" | Set-LocalUser -Password $password

      - name: Install Chrome
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile C:\chrome_installer.exe
          & C:\chrome_installer.exe /silent /install /system-level

      - name: Start ngrok tunnel
        shell: pwsh
        run: |
          Start-Process C:\ngrok\ngrok.exe -ArgumentList "tcp 3389" -NoNewWindow

      - name: Display Connection Info
        shell: pwsh
        run: |
          Write-Host "================================"
          Write-Host "RDP VM is ONLINE"
          Write-Host "================================"
          Write-Host "Username: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host ""
          Write-Host "Check ngrok dashboard for tunnel URL"
          Write-Host "https://dashboard.ngrok.com"
          Write-Host "================================"

      - name: Keep VM Running
        shell: pwsh
        run: |
          $duration = ${{ inputs.duration || 360 }}
          Write-Host "VM running for $duration minutes..."
          Start-Sleep -Seconds ($duration * 60)
